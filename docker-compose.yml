services:
  google-docs-mcp:
    build: .
    image: google-docs-mcp:latest
    container_name: google-docs-mcp
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - PORT=${PORT:-8080}
      # Optional: isolate tokens per Google account
      # - GOOGLE_MCP_PROFILE=work
    volumes:
      # Mount the OAuth token from the host so auth state persists.
      # Run the one-time auth step on the host (see README) before starting.
      - "${HOME}/.config/google-docs-mcp:/root/.config/google-docs-mcp:rw"
